# ─────────────────────────────────────────────────────────────────────────────
#  packages/cc_236/imu_lvgl.yaml  —  LVGL 8.4.0
#  Elecrow 5" 800x480  •  BMI160 IMU  •  3 onglets
#
#  Onglet Attitude   : clinometres roulis/tangage + compas nautique
#  Onglet Info       : valeurs brutes, statut IMU, statut GPS
#  Onglet Parametres : calibration + inversion axes
#
#  C++ : packages/cc_236/draw_widgets.h  (clinometre + compas)
# ─────────────────────────────────────────────────────────────────────────────

esphome:
  includes:
    - packages/cc_236/draw_widgets.h
    - packages/cc_236/tpms_udp.h
  on_boot:
    priority: -200    # apres init LVGL et widgets
    then:
      - lambda: |-
          // Ouvrir le socket UDP TPMS (persistant, non-bloquant)
          tpms_udp_begin(${tpms_udp_port});
          lv_obj_t* rc = id(roll_canvas);
          lv_obj_t* pc = id(pitch_canvas);
          if (rc && lv_obj_is_valid(rc)) clinometer_draw_bg(rc, id(g_max_roll), &clm_bg_roll);
          if (pc && lv_obj_is_valid(pc)) clinometer_draw_bg(pc, id(g_max_pitch), &clm_bg_pitch);
          float px1=-999.0f, py1=-999.0f, px2=-999.0f, py2=-999.0f;
          if (rc && clm_bg_roll)  clinometer_draw_ball(rc, clm_bg_roll,  0.0f, id(g_max_roll), px1, py1);
          if (pc && clm_bg_pitch) clinometer_draw_ball(pc, clm_bg_pitch, 0.0f, id(g_max_pitch), px2, py2);
          id(g_roll_ball_x)  = px1; id(g_roll_ball_y)  = py1;
          id(g_pitch_ball_x) = px2; id(g_pitch_ball_y) = py2;
          lv_obj_invalidate(lv_scr_act());

image:
  - file: images/delfin-c621.png
    id: img_delfin
    type: RGB565

display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: true
    update_interval: never    # LVGL gère son propre flush — ne pas bloquer la boucle
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin:    40
    hsync_pin: 39
    vsync_pin: 41
    pclk_pin:  0
    pclk_frequency: 12MHz
    data_pins:
      red:   [45, 48, 47, 21, 14]
      green: [5,  6,  7,  15, 16, 4]
      blue:  [8,  3,  46,  9,  1]

touchscreen:
  platform: gt911
  on_touch:
    then:
      - lambda: |-
          id(g_last_activity_ms) = millis();
          if (id(g_screen_sleeping)) {
            id(g_screen_sleeping) = false;
            // Rallumer le rétroéclairage
            auto call = id(back_light).turn_on();
            call.set_brightness(1.0f);
            call.perform();
            ESP_LOGI("sleep", "Ecran reveille par toucher");
          }

globals:
  - id: g_roll
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: g_pitch
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: g_roll_raw
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: g_pitch_raw
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: g_roll_offset
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: g_pitch_offset
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: g_sign_roll
    type: int
    restore_value: yes
    initial_value: "1"
  - id: g_sign_pitch
    type: int
    restore_value: yes
    initial_value: "1"
  - id: g_swap_rp
    type: int
    restore_value: yes
    initial_value: "0"
  - id: g_heading
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: g_imu_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: g_imu_ready
    type: bool
    restore_value: no
    initial_value: "false"

  # Positions bille clinometre (pour restauration partielle)
  - id: g_roll_ball_x
    type: float
    restore_value: no
    initial_value: "-999.0"
  - id: g_roll_ball_y
    type: float
    restore_value: no
    initial_value: "-999.0"
  - id: g_pitch_ball_x
    type: float
    restore_value: no
    initial_value: "-999.0"
  - id: g_pitch_ball_y
    type: float
    restore_value: no
    initial_value: "-999.0"

  # Limites maximales — stockées en flash, modifiables depuis l'onglet Parametres
  - id: g_max_roll
    type: float
    restore_value: yes
    initial_value: "15.0"
  - id: g_max_pitch
    type: float
    restore_value: yes
    initial_value: "15.0"

  # Pressions + températures TPMS (reçues via UDP depuis cc-168)
  - id: g_tpms_fl_p
    type: float
    restore_value: no
    initial_value: "-1.0"
  - id: g_tpms_fl_t
    type: float
    restore_value: no
    initial_value: "-99.0"
  - id: g_tpms_fr_p
    type: float
    restore_value: no
    initial_value: "-1.0"
  - id: g_tpms_fr_t
    type: float
    restore_value: no
    initial_value: "-99.0"
  - id: g_tpms_rl_p
    type: float
    restore_value: no
    initial_value: "-1.0"
  - id: g_tpms_rl_t
    type: float
    restore_value: no
    initial_value: "-99.0"
  - id: g_tpms_rr_p
    type: float
    restore_value: no
    initial_value: "-1.0"
  - id: g_tpms_rr_t
    type: float
    restore_value: no
    initial_value: "-99.0"
  - id: g_tpms_ready
    type: bool
    restore_value: no
    initial_value: "false"

  # Pressions de référence à 20°C (configurables dans Paramètres)
  - id: g_tpms_ref_front
    type: float
    restore_value: yes
    initial_value: "4.0"
  - id: g_tpms_ref_rear
    type: float
    restore_value: yes
    initial_value: "4.8"
  - id: g_tpms_abs_limit
    type: float
    restore_value: yes
    initial_value: "5.5"

  # Ecran de veille
  - id: g_sleep_enabled
    type: bool
    restore_value: yes
    initial_value: "true"    # actif par defaut

  - id: g_last_activity_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: g_screen_sleeping
    type: bool
    restore_value: no
    initial_value: "false"


binary_sensor:

  - platform: lvgl
    widget: btn_calibrate
    name: "Calibration IMU"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_roll_offset)  = id(g_roll);
            id(g_pitch_offset) = id(g_pitch);
        - lvgl.label.update:
            id: imu_status_label
            text: "IMU: calibration enregistree"
        - lambda: |-
            lv_obj_invalidate(lv_scr_act());

  - platform: lvgl
    widget: btn_reset
    name: "Reset Calibration IMU"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_roll_offset)  = 0.0f;
            id(g_pitch_offset) = 0.0f;
        - lvgl.label.update:
            id: imu_status_label
            text: "IMU: calibration remise a zero"

  - platform: lvgl
    widget: btn_calibrate_p
    name: "Calibration IMU (param)"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_roll_offset)  = id(g_roll);
            id(g_pitch_offset) = id(g_pitch);
        - lvgl.label.update:
            id: lbl_calib_status
            text: !lambda |-
              static char buf[40];
              snprintf(buf, sizeof(buf), "Ref: R%+.1f  P%+.1f",
                       id(g_roll_offset), id(g_pitch_offset));
              return buf;

  - platform: lvgl
    widget: btn_reset_p
    name: "Reset Calibration IMU (param)"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_roll_offset)  = 0.0f;
            id(g_pitch_offset) = 0.0f;
        - lvgl.label.update:
            id: lbl_calib_status
            text: "Ref: R+0.0  P+0.0"

  - platform: lvgl
    widget: btn_inv_roll
    name: "Inverser Roulis"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_sign_roll) = -id(g_sign_roll);
            id(g_imu_last_ms) = 0;
        - lvgl.label.update:
            id: lbl_inv_roll
            text: !lambda |-
              return std::string(id(g_sign_roll) < 0 ? "INVERSE" : "normal");

  - platform: lvgl
    widget: btn_inv_pitch
    name: "Inverser Tangage"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_sign_pitch) = -id(g_sign_pitch);
            id(g_imu_last_ms) = 0;
        - lvgl.label.update:
            id: lbl_inv_pitch
            text: !lambda |-
              return std::string(id(g_sign_pitch) < 0 ? "INVERSE" : "normal");

  - platform: lvgl
    widget: btn_swap_rp
    name: "Swap Roll-Pitch"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_swap_rp) = 1 - id(g_swap_rp);
            id(g_imu_last_ms) = 0;
        - lvgl.label.update:
            id: lbl_swap_rp
            text: !lambda |-
              return std::string(id(g_swap_rp) ? "SWAPE" : "normal");

  # ── Boutons limites roulis / tangage ────────────────────────────────────────
  - platform: lvgl
    widget: btn_sleep_toggle
    name: "Veille ecran toggle"
    internal: true
    on_press:
      then:
        - lambda: |-
            id(g_sleep_enabled) = !id(g_sleep_enabled);
            id(g_last_activity_ms) = millis();
            // Si on desactive la veille et l'ecran dort, le reveiller
            if (!id(g_sleep_enabled) && id(g_screen_sleeping)) {
              id(g_screen_sleeping) = false;
              auto call = id(back_light).turn_on();
              call.set_brightness(1.0f);
              call.perform();
            }
        - lvgl.label.update:
            id: lbl_sleep_status
            text: !lambda |-
              return std::string(id(g_sleep_enabled) ? "active (10 min)" : "desactivee");
        - lvgl.widget.update:
            id: btn_sleep_toggle
            bg_color: !lambda |-
              return id(g_sleep_enabled) ? lv_color_hex(0x1E3A5F) : lv_color_hex(0x431407);

  # ── Boutons référence TPMS ─────────────────────────────────────────────────
  - platform: lvgl
    widget: btn_ref_front_minus
    name: "TPMS ref avant moins"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_tpms_ref_front) - 0.1f;
            if (v < 1.0f) v = 1.0f;
            id(g_tpms_ref_front) = roundf(v * 10.0f) / 10.0f;
        - lvgl.label.update:
            id: lbl_tpms_ref_front
            text:
              format: "%.1f bar"
              args: [ "id(g_tpms_ref_front)" ]

  - platform: lvgl
    widget: btn_ref_front_plus
    name: "TPMS ref avant plus"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_tpms_ref_front) + 0.1f;
            if (v > 6.0f) v = 6.0f;
            id(g_tpms_ref_front) = roundf(v * 10.0f) / 10.0f;
        - lvgl.label.update:
            id: lbl_tpms_ref_front
            text:
              format: "%.1f bar"
              args: [ "id(g_tpms_ref_front)" ]

  - platform: lvgl
    widget: btn_ref_rear_minus
    name: "TPMS ref arriere moins"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_tpms_ref_rear) - 0.1f;
            if (v < 1.0f) v = 1.0f;
            id(g_tpms_ref_rear) = roundf(v * 10.0f) / 10.0f;
        - lvgl.label.update:
            id: lbl_tpms_ref_rear
            text:
              format: "%.1f bar"
              args: [ "id(g_tpms_ref_rear)" ]

  - platform: lvgl
    widget: btn_ref_rear_plus
    name: "TPMS ref arriere plus"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_tpms_ref_rear) + 0.1f;
            if (v > 6.0f) v = 6.0f;
            id(g_tpms_ref_rear) = roundf(v * 10.0f) / 10.0f;
        - lvgl.label.update:
            id: lbl_tpms_ref_rear
            text:
              format: "%.1f bar"
              args: [ "id(g_tpms_ref_rear)" ]

  - platform: lvgl
    widget: btn_roll_minus
    name: "Roulis max moins"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_max_roll) - 1.0f;
            if (v < 5.0f) v = 5.0f;
            id(g_max_roll) = v;
        - lvgl.label.update:
            id: lbl_max_roll_val
            text:
              format: "%.0f deg"
              args: [ "id(g_max_roll)" ]

  - platform: lvgl
    widget: btn_roll_plus
    name: "Roulis max plus"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_max_roll) + 1.0f;
            if (v > 30.0f) v = 30.0f;
            id(g_max_roll) = v;
        - lvgl.label.update:
            id: lbl_max_roll_val
            text:
              format: "%.0f deg"
              args: [ "id(g_max_roll)" ]

  - platform: lvgl
    widget: btn_pitch_minus
    name: "Tangage max moins"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_max_pitch) - 1.0f;
            if (v < 5.0f) v = 5.0f;
            id(g_max_pitch) = v;
        - lvgl.label.update:
            id: lbl_max_pitch_val
            text:
              format: "%.0f deg"
              args: [ "id(g_max_pitch)" ]

  - platform: lvgl
    widget: btn_pitch_plus
    name: "Tangage max plus"
    internal: true
    on_press:
      then:
        - lambda: |-
            float v = id(g_max_pitch) + 1.0f;
            if (v > 30.0f) v = 30.0f;
            id(g_max_pitch) = v;
        - lvgl.label.update:
            id: lbl_max_pitch_val
            text:
              format: "%.0f deg"
              args: [ "id(g_max_pitch)" ]

sensor:
  - platform: bmi160
    address: 0x68
    i2c_id: i2c_bus_a
    update_interval: 50ms
    acceleration_x:
      id: bmi_ax
      internal: true
    acceleration_y:
      id: bmi_ay
      internal: true
    acceleration_z:
      id: bmi_az
      internal: true
    gyroscope_x:
      id: bmi_gx
      internal: true
    gyroscope_y:
      id: bmi_gy
      internal: true
    gyroscope_z:
      id: bmi_gz
      internal: true
    temperature:
      name: "IMU Temperature"
      id: bmi_temp
      unit_of_measurement: "C"
      accuracy_decimals: 1
      entity_category: diagnostic
      icon: mdi:thermometer
      filters:
        - throttle: 30s

  - platform: template
    name: "Roll"
    id: imu_roll
    unit_of_measurement: "deg"
    accuracy_decimals: 1
    state_class: measurement
    icon: mdi:axis-x-rotate-clockwise
    lambda: return id(g_roll) - id(g_roll_offset);
    update_interval: 200ms
    filters:
      - clamp:
          min_value: -15.0
          max_value: 15.0

  - platform: template
    name: "Pitch"
    id: imu_pitch
    unit_of_measurement: "deg"
    accuracy_decimals: 1
    state_class: measurement
    icon: mdi:axis-y-rotate-clockwise
    lambda: return id(g_pitch) - id(g_pitch_offset);
    update_interval: 200ms
    filters:
      - clamp:
          min_value: -15.0
          max_value: 15.0

interval:

  # ── Filtre complementaire 50ms ────────────────────────────────────────────
  - interval: 50ms
    then:
      - lambda: |-
          if (!id(bmi_ax).has_state() || !id(bmi_ay).has_state() ||
              !id(bmi_az).has_state()) return;

          float ax = id(bmi_ax).state;
          float ay = id(bmi_ay).state;
          float az = id(bmi_az).state;
          float gx = id(bmi_gx).state;
          float gy = id(bmi_gy).state;

          float norm = sqrtf(ax*ax + ay*ay + az*az);
          if (!std::isfinite(norm) || norm < 1.0f || norm > 25.0f) return;
          if (!std::isfinite(gx) || !std::isfinite(gy)) return;

          uint32_t now_ms = millis();
          if (id(g_imu_last_ms) == 0) {
            float ra0 = atan2f(ay, az) * 180.0f / M_PI;
            float pa0 = atan2f(-ax, sqrtf(ay*ay + az*az)) * 180.0f / M_PI;
            if (id(g_swap_rp)) { float t=ra0; ra0=pa0; pa0=t; }
            id(g_roll)      = (float)id(g_sign_roll)  * ra0;
            id(g_pitch)     = (float)id(g_sign_pitch) * pa0;
            id(g_imu_last_ms) = now_ms;
            id(g_imu_ready) = true;
            return;
          }
          float dt = (now_ms - id(g_imu_last_ms)) / 1000.0f;
          id(g_imu_last_ms) = now_ms;
          if (dt <= 0.0f || dt > 0.5f) return;

          float roll_a  = atan2f(ay, az) * 180.0f / M_PI;
          float pitch_a = atan2f(-ax, sqrtf(ay*ay + az*az)) * 180.0f / M_PI;
          if (id(g_swap_rp)) { float t=roll_a; roll_a=pitch_a; pitch_a=t; }
          roll_a  *= (float)id(g_sign_roll);
          pitch_a *= (float)id(g_sign_pitch);
          float grx = (float)id(g_sign_roll)  * (id(g_swap_rp) ? gy : gx);
          float gry = (float)id(g_sign_pitch) * (id(g_swap_rp) ? gx : gy);

          id(g_roll_raw)  = roll_a;
          id(g_pitch_raw) = pitch_a;

          const float CF = 0.98f;
          id(g_roll)  = CF * (id(g_roll)  + grx*dt) + (1.0f-CF) * roll_a;
          id(g_pitch) = CF * (id(g_pitch) + gry*dt) + (1.0f-CF) * pitch_a;

  # ── Mise a jour LVGL 80ms ─────────────────────────────────────────────────
  - interval: 80ms
    then:
      - if:
          condition:
            lambda: return id(g_imu_ready);
          then:
            # Init timer activite au premier cycle
            - lambda: |-
                if (id(g_last_activity_ms) == 0) id(g_last_activity_ms) = millis();
            # Bille seule (~0.3ms) + compas (~20ms) — pas de redraw fond
            - lambda: |-
                float roll_c  = id(g_roll)  - id(g_roll_offset);
                float pitch_c = id(g_pitch) - id(g_pitch_offset);
                lv_obj_t* rc = id(roll_canvas);
                lv_obj_t* pc = id(pitch_canvas);
                lv_obj_t* cc = id(compass_canvas);
                float rbx=id(g_roll_ball_x),  rby=id(g_roll_ball_y);
                float pbx=id(g_pitch_ball_x), pby=id(g_pitch_ball_y);
                if (rc && lv_obj_is_valid(rc) && clm_bg_roll)
                    clinometer_draw_ball(rc, clm_bg_roll,  roll_c,  id(g_max_roll), rbx, rby);
                if (pc && lv_obj_is_valid(pc) && clm_bg_pitch)
                    clinometer_draw_ball(pc, clm_bg_pitch, pitch_c, id(g_max_pitch), pbx, pby);
                id(g_roll_ball_x)=rbx; id(g_roll_ball_y)=rby;
                id(g_pitch_ball_x)=pbx; id(g_pitch_ball_y)=pby;
                if (cc && lv_obj_is_valid(cc))
                    compass_draw_frame(cc, roll_c, pitch_c, id(g_heading));
                // Flush dirty regions uniquement (bille + compas) — non-bloquant
                lv_timer_handler();
            # Labels valeurs (onglet Attitude)
            - lvgl.label.update:
                id: roll_value_label
                text:
                  format: "%+.1f"
                  args: [ "id(g_roll) - id(g_roll_offset)" ]
            - lvgl.label.update:
                id: pitch_value_label
                text:
                  format: "%+.1f"
                  args: [ "id(g_pitch) - id(g_pitch_offset)" ]
            # Dots couleur
            - lvgl.widget.update:
                id: roll_dot
                bg_color: !lambda |-
                  float v = std::abs(id(g_roll) - id(g_roll_offset));
                  if (v >= 10.0f) return lv_color_hex(0xEF4444);
                  if (v >=  6.0f) return lv_color_hex(0xF59E0B);
                  return lv_color_hex(0x22C55E);
            - lvgl.widget.update:
                id: pitch_dot
                bg_color: !lambda |-
                  float v = std::abs(id(g_pitch) - id(g_pitch_offset));
                  if (v >= 10.0f) return lv_color_hex(0xEF4444);
                  if (v >=  6.0f) return lv_color_hex(0xF59E0B);
                  return lv_color_hex(0x22C55E);
            # Cap GPS
            - lvgl.label.update:
                id: hdg_value_label
                text:
                  format: "%03.0f"
                  args: [ "id(g_heading)" ]
          else:
            - lvgl.label.update:
                id: imu_status_label
                text: "IMU: initialisation..."

  # ── Réception TPMS UDP 2s (non-bloquant) ────────────────────────────────────
  - interval: 2s
    then:
      - lambda: |-
          tpms_udp_recv(&id(g_tpms_fl_p), &id(g_tpms_fl_t),
                        &id(g_tpms_fr_p), &id(g_tpms_fr_t),
                        &id(g_tpms_rl_p), &id(g_tpms_rl_t),
                        &id(g_tpms_rr_p), &id(g_tpms_rr_t),
                        &id(g_tpms_ready));

  # ── Mise à jour badges TPMS 5s ───────────────────────────────────────────────
  - interval: 5s
    then:
      - lambda: |-
          // Données brutes
          float fl_p=id(g_tpms_fl_p), fl_t=id(g_tpms_fl_t);
          float fr_p=id(g_tpms_fr_p), fr_t=id(g_tpms_fr_t);
          float rl_p=id(g_tpms_rl_p), rl_t=id(g_tpms_rl_t);
          float rr_p=id(g_tpms_rr_p), rr_t=id(g_tpms_rr_t);
          float ref_f = id(g_tpms_ref_front);
          float ref_r = id(g_tpms_ref_rear);
          float abs_lim = id(g_tpms_abs_limit);

          // Pression corrigée à 20°C (Gay-Lussac)
          auto corrected = [](float p, float t) -> float {
              return tpms_correct_pressure(p, t);
          };

          // Couleurs selon écart à la référence (pression corrigée)
          // Vert: |écart| < 0.1  Orange: < 0.3  Rouge: >= 0.3 ou >= limite absolue
          auto get_colors = [&](float p, float t, float ref,
                               lv_color_t& bg, lv_color_t& bd, lv_color_t& tx) {
              float pc = corrected(p, t);
              if (p < 0.0f || pc < 0.0f) {
                  // Pas de signal
                  bg=lv_color_hex(0x111827);
                  bd=lv_color_hex(0x1E293B);
                  tx=lv_color_hex(0x334155);
                  return;
              }
              if (p >= abs_lim) {
                  // Limite absolue dépassée → rouge vif
                  bg=lv_color_hex(0x450A0A);
                  bd=lv_color_hex(0xEF4444);
                  tx=lv_color_hex(0xEF4444);
                  return;
              }
              float ecart = fabsf(pc - ref);
              if (ecart < 0.1f) {
                  bg=lv_color_hex(0x052E16);
                  bd=lv_color_hex(0x22C55E);
                  tx=lv_color_hex(0x22C55E);
              } else if (ecart < 0.3f) {
                  bg=lv_color_hex(0x431407);
                  bd=lv_color_hex(0xF59E0B);
                  tx=lv_color_hex(0xF59E0B);
              } else {
                  bg=lv_color_hex(0x450A0A);
                  bd=lv_color_hex(0xEF4444);
                  tx=lv_color_hex(0xEF4444);
              }
          };

          struct TireData { lv_obj_t* badge; lv_obj_t* lbl;
                            float p; float t; float ref; };
          TireData tires[] = {
              {id(badge_fl), id(lbl_fl_pres), fl_p, fl_t, ref_f},
              {id(badge_fr), id(lbl_fr_pres), fr_p, fr_t, ref_f},
              {id(badge_rl), id(lbl_rl_pres), rl_p, rl_t, ref_r},
              {id(badge_rr), id(lbl_rr_pres), rr_p, rr_t, ref_r},
          };
          for (auto& tire : tires) {
              lv_color_t bg, bd, tx;
              get_colors(tire.p, tire.t, tire.ref, bg, bd, tx);
              if (tire.badge && lv_obj_is_valid(tire.badge)) {
                  lv_obj_set_style_bg_color(tire.badge, bg, 0);
                  lv_obj_set_style_border_color(tire.badge, bd, 0);
              }
              if (tire.lbl && lv_obj_is_valid(tire.lbl)) {
                  lv_obj_set_style_text_color(tire.lbl, tx, 0);
                  static char buf[12];
                  if (tire.p < 0.0f)
                      strncpy(buf, "--", sizeof(buf));
                  else {
                      float pc = corrected(tire.p, tire.t);
                      snprintf(buf, sizeof(buf), "%.2f", tire.p);
                      (void)pc;  // pc utilisé pour couleur
                  }
                  lv_label_set_text(tire.lbl, buf);
              }
          }

  # ── Vérification veille 30s ─────────────────────────────────────────────────
  - interval: 30s
    then:
      - lambda: |-
          if (!id(g_sleep_enabled) || id(g_screen_sleeping)) return;
          uint32_t now = millis();
          // Initialiser g_last_activity_ms au premier appel
          if (id(g_last_activity_ms) == 0) {
            id(g_last_activity_ms) = now;
            return;
          }
          uint32_t elapsed = now - id(g_last_activity_ms);
          const uint32_t TIMEOUT_MS = 10UL * 60UL * 1000UL; // 10 minutes
          if (elapsed >= TIMEOUT_MS) {
            id(g_screen_sleeping) = true;
            auto call = id(back_light).turn_off();
            call.perform();
            ESP_LOGI("sleep", "Ecran mis en veille (%lu s sans activite)", elapsed/1000);
          }

  # ── Mise a jour onglet Info 1s ────────────────────────────────────────────
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(g_imu_ready);
          then:
            - lvgl.label.update:
                id: imu_status_label
                text: !lambda |-
                  return std::string(id(g_imu_ready) ? "IMU: actif  CF alpha=0.98" : "IMU: init...");
            - lvgl.label.update:
                id: info_roll_corr
                text:
                  format: "%+.2f deg"
                  args: [ "id(g_roll) - id(g_roll_offset)" ]
            - lvgl.label.update:
                id: info_roll_raw
                text:
                  format: "%+.2f deg"
                  args: [ "id(g_roll_raw)" ]
            - lvgl.label.update:
                id: info_roll_ref
                text:
                  format: "%+.2f deg"
                  args: [ "id(g_roll_offset)" ]
            - lvgl.label.update:
                id: info_pitch_corr
                text:
                  format: "%+.2f deg"
                  args: [ "id(g_pitch) - id(g_pitch_offset)" ]
            - lvgl.label.update:
                id: info_pitch_raw
                text:
                  format: "%+.2f deg"
                  args: [ "id(g_pitch_raw)" ]
            - lvgl.label.update:
                id: info_pitch_ref
                text:
                  format: "%+.2f deg"
                  args: [ "id(g_pitch_offset)" ]
            - lvgl.label.update:
                id: info_imu_temp
                text:
                  format: "%.1f C"
                  args: [ "id(bmi_temp).state" ]
            - lvgl.label.update:
                id: lbl_imu_temp_dolphin
                text:
                  format: "%.1f°C"
                  args: [ "id(bmi_temp).state" ]
            - lvgl.label.update:
                id: lbl_tpms_ref_front
                text:
                  format: "%.1f bar"
                  args: [ "id(g_tpms_ref_front)" ]
            - lvgl.label.update:
                id: lbl_tpms_ref_rear
                text:
                  format: "%.1f bar"
                  args: [ "id(g_tpms_ref_rear)" ]
            - lvgl.label.update:
                id: lbl_max_roll_val
                text:
                  format: "%.0f deg"
                  args: [ "id(g_max_roll)" ]
            - lvgl.label.update:
                id: lbl_max_pitch_val
                text:
                  format: "%.0f deg"
                  args: [ "id(g_max_pitch)" ]
            - lvgl.label.update:
                id: info_axes
                text: !lambda |-
                  static char buf[40];
                  const char* sr = id(g_sign_roll)  < 0 ? "invR" : "R+";
                  const char* sp = id(g_sign_pitch) < 0 ? "invP" : "P+";
                  const char* sw = id(g_swap_rp)    ? " swap" : "";
                  snprintf(buf, sizeof(buf), "%s %s%s", sr, sp, sw);
                  return buf;

